<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Learn HTML Broadcast Graphics</title>
  <!-- The app lives in /app/. Redirect the repo root there so the bare
       Pages URL (…/learn-html-gfx/) lands on the app instead of a 404. -->
  <link rel="canonical" href="app/">
  <script>location.replace('app/' + location.search + location.hash);</script>
  <meta http-equiv="refresh" content="0; url=app/">
</head>
<body>
  <p>Redirecting to <a href="app/">the app</a>&hellip;</p>
</body>
</html>
